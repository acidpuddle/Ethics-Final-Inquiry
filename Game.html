<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Game</title>

<script src="script.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #060CE9;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    margin: 20px 0;
}

.board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
    padding: 20px;
}

.category {
    background-color: #00008B;
    padding: 7px;
    font-weight: bold;
    border: 2px solid white;
}

.cell {
    background-color: #0000CD;
    padding: 30px 10px;
    font-size: 24px;
    border: 2px solid white;
    cursor: pointer;
}

.cell:hover {
    background-color: #1E90FF;
}

#questionBox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

#questionText {
    font-size: 32px;
    margin-bottom: 20px;
}

#answerText {
    font-size: 24px;
    margin-bottom: 20px;
    display: none;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    margin: 5px;
}
</style>
</head>

<body dir="ltr" spellcheck="false" style="direction: ltr; min-height: 901px;">

<h1>Jeopardy Game</h1>

<div class="board">

<!-- Categories -->
<div class="category">Why does it Matter?</div>
<div class="category">Economic Effects</div>
<div class="category">Affect on Artists</div>
<div class="category">Emotional Authenticity</div>
<div class="category">Algorithmic Promotion</div>
<div class="category">Impact on Culture and Media</div>

<!-- Row 1 -->
<div class="cell" data-question="Question 1A" data-answer="Answer 1A">$100</div>
<div class="cell" data-question="Question 2A" data-answer="Answer 2A">$100</div>
<div class="cell" data-question="Question 3A" data-answer="Answer 3A">$100</div>
<div class="cell" data-question="Question 4A" data-answer="Answer 4A">$100</div>
<div class="cell" data-question="Question 5A" data-answer="Answer 5A">$100</div>
<div class="cell" data-question="Question 6A" data-answer="Answer 6A">$100</div>

<!-- Row 2 -->
<div class="cell" data-question="Question 1B" data-answer="Answer 1B">$200</div>
<div class="cell" data-question="Question 2B" data-answer="Answer 2B">$200</div>
<div class="cell" data-question="Question 3B" data-answer="Answer 3B">$200</div>
<div class="cell" data-question="Question 4B" data-answer="Answer 4B">$200</div>
<div class="cell" data-question="Question 5B" data-answer="Answer 5B">$200</div>
<div class="cell" data-question="Question 6B" data-answer="Answer 6B">$200</div>

<!-- Row 3 -->
<div class="cell" data-question="Question 1C" data-answer="Answer 1C">$300</div>
<div class="cell" data-question="Question 2C" data-answer="Answer 2C">$300</div>
<div class="cell" data-question="Question 3C" data-answer="Answer 3C">$300</div>
<div class="cell" data-question="Question 4C" data-answer="Answer 4C">$300</div>
<div class="cell" data-question="Question 5C" data-answer="Answer 5C">$300</div>
<div class="cell" data-question="Question 6C" data-answer="Answer 6C">$300</div>

</div>

<!-- Q/A-->
<div id="questionBox">
    <div id="questionText"><br></div>
    <div id="answerText"><br></div>
    <button id="showAnswerBtn">Show Answer</button>
    <button id="closeBtn">Close</button>
</div>

</body></html>
